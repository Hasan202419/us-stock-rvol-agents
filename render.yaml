        sync: false
      - key: OPENAI_ANALYSIS_MAX_RETRIES
        sync: false
      - key: OPENAI_ANALYSIS_RETRY_BASE_SEC
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: TRADING_MODE
        sync: false
      - key: DATA_DELAY_MINUTES
        sync: false
      - key: STRATEGY_MODE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ALERTS_ENABLED
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: ZOYA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FINVIZ_ELITE_AUTH
        sync: false
      - key: FINVIZ_ELITE_EXPORT_QUERY
        sync: false
      - key: FINVIZ_ELITE_EXPORT_BASE
        sync: false
      - key: FETCH_UNIVERSE_FINVIZ_FIRST
        sync: false

