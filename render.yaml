# Render Blueprint (Infrastructure as Code).
# New → Blueprint → Git ulang; `sync: false` kalitlar Render Dashboard → Environment da to‘ldiriladi.
# Web: Streamlit dashboard. Worker: Telegram command bot (long-poll).
# Worker uchun ham dashboard bilan bir xil API kalitlari kerak (/scan skan pipeline).
# TELEGRAM_ALLOWED_CHAT_IDS — ixtiyoriy, vergul bilan chat id lar (bo‘sh bo‘lsa hammaga javob).
# AI_PROVIDER va OPENAI_* — WEB va WORKER da bir xil bo‘lsa, skanda ChatGPT bosqichi ikkalasida ishlaydi.
# WORKER uchun TELEGRAM_SCAN_PRESET / alert lar quyidagi default qiymatlar bilan yonadi (Dashboard da o‘zgartirish mumkin).
# Free Web ~15 daqiqadan keyin uxlayadi; Worker alohida rejada (Blueprint sync dan keyin Dashboard da tekshiring).

# Qo‘lda: python scripts/trigger_render_deploy.py
# PowerShell: `RENDER_API_KEY` tekshiruvi — `powershell -NoProfile -File scripts/verify_render_api.ps1` (CMD ning `^` qatori PowerShellda ishlamaydi; curl headerlarni bitta qatorda yuboring).
# CI: `.github/workflows/render-deploy.yml` — GitHub Secrets: RENDER_DEPLOY_HOOK_URL yoki RENDER_API_KEY + RENDER_SERVICE_ID.

services:
  - type: web
    name: us-stock-rvol-dashboard
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: YAHOO_FINANCE_ENABLED
        sync: false
      - key: INTRADAY_YAHOO_BEFORE_POLYGON
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_ENABLED
        sync: false
      - key: OPENAI_ANALYSIS_MAX_RETRIES
        sync: false
      - key: OPENAI_ANALYSIS_RETRY_BASE_SEC
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: TRADING_MODE
        sync: false
      - key: DATA_DELAY_MINUTES
        sync: false
      - key: STRATEGY_MODE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ALERT_ON_SCAN
        sync: false
      - key: TELEGRAM_ALERT_TOP_N
        sync: false
      - key: TELEGRAM_ALERTS_ENABLED
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: ZOYA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FINVIZ_ELITE_AUTH
        sync: false
      - key: FINVIZ_ELITE_EXPORT_QUERY
        sync: false
      - key: FINVIZ_ELITE_EXPORT_BASE
        sync: false
      - key: FETCH_UNIVERSE_FINVIZ_FIRST
        sync: false

  # Long-polling Telegram: /scan, /signals, /help (scripts/telegram_command_bot.py)
  - type: worker
    name: us-stock-rvol-telegram-bot
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python scripts/telegram_command_bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
      - key: TELEGRAM_BOT_TOP_ROWS
        sync: false
      - key: TELEGRAM_BOT_REPLY_TOP_N
        sync: false
      - key: TELEGRAM_SCAN_PRESET
        value: Balanced
      - key: TELEGRAM_MAX_SYMBOLS
        value: "80"
      - key: TELEGRAM_DESK_LABEL
        value: TG scan
      - key: TELEGRAM_ALERT_ON_SCAN
        value: "true"
      - key: TELEGRAM_ALERT_TOP_N
        value: "5"
      - key: TELEGRAM_USE_FINVIZ_CSV
        sync: false
      - key: TELEGRAM_SKIP_DELETE_WEBHOOK
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: YAHOO_FINANCE_ENABLED
        sync: false
      - key: INTRADAY_YAHOO_BEFORE_POLYGON
