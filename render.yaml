      - key: TELEGRAM_BOT_REPLY_TOP_N
        value: "10"
      - key: SCAN_MAX_WORKERS
        value: "12"
      - key: TELEGRAM_DESK_LABEL
        value: TG scan
      - key: TELEGRAM_ALERT_ON_SCAN
        value: "false"
      - key: TELEGRAM_ALERT_TOP_N
        value: "5"
      - key: TELEGRAM_USE_FINVIZ_CSV
        sync: false
      - key: TELEGRAM_SKIP_DELETE_WEBHOOK
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: MASSIVE_API_KEY
        sync: false
      - key: YAHOO_FINANCE_ENABLED
        sync: false
      - key: INTRADAY_YAHOO_BEFORE_POLYGON
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_ENABLED
        sync: false
      - key: OPENAI_ANALYSIS_MAX_RETRIES
        sync: false
      - key: OPENAI_ANALYSIS_RETRY_BASE_SEC
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_KEY_ID
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_API_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: TRADING_MODE
        sync: false
      - key: DATA_DELAY_MINUTES
        sync: false
      - key: MARKET_DATA_PROVIDER_PRIORITY
        sync: false
      - key: STRATEGY_MODE
        sync: false
      - key: SCAN_AI_INCLUDE_FAILS
