# Render Blueprint (Infrastructure as Code).
# New → Blueprint → Git ulang; `sync: false` kalitlar Render Dashboard → Environment da to‘ldiriladi.
#
# 24/7 va terminal farqi (muhim):
# - Lokal: `streamlit run` yoki `python scripts/telegram_command_bot.py` faqat sizning PC da ishlaydi;
#   terminal yopilsa jarayon to‘xtaydi — bu bulutdagi 24/7 emas.
# - Bulut: quyidagi `web` (dashboard URL) va `worker` (Telegram long-poll) Render serverlarida alohida ishlaydi;
#   PC o‘chiq bo‘lsa ham bot/sayt ishlashi mumkin (servis Live + env to‘g‘ri bo‘lsa).
# - Brauzerda ochish: Render berilgan `https://....onrender.com` manzili; localhost:8501 faqat lokal.
#
# Web: Streamlit dashboard. Worker: Telegram command bot (long-poll).
# Worker uchun ham dashboard bilan bir xil API kalitlari kerak (/scan skan pipeline).
# TELEGRAM_ALLOWED_CHAT_IDS — ixtiyoriy, vergul bilan chat id lar (bo‘sh bo‘lsa hammaga javob).
# Sukut AI_PROVIDER=blueprint da auto (`auto`da ikkala kalit bo‘lsa runtime DeepSeek ustun); Dashboarddan o‘zgartirish mumkin.
# WORKER uchun TELEGRAM_SCAN_PRESET / alert lar quyidagi default qiymatlar bilan yonadi (Dashboard da o‘zgartirish mumkin).
# Tekshirish: Dashboard → har servis → Logs; lokalda: python scripts/render_worker_smoke.py

# Qo‘lda: python scripts/trigger_render_deploy.py
# PowerShell: `RENDER_API_KEY` tekshiruvi — `powershell -NoProfile -File scripts/verify_render_api.ps1` (CMD ning `^` qatori PowerShellda ishlamaydi; curl headerlarni bitta qatorda yuboring).
# CI: `.github/workflows/render-deploy.yml` — GitHub Secrets: RENDER_DEPLOY_HOOK_URL yoki RENDER_API_KEY + RENDER_SERVICE_ID.

services:
  - type: web
    name: us-stock-rvol-dashboard
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: MASSIVE_API_KEY
        sync: false
      - key: YAHOO_FINANCE_ENABLED
        sync: false
      - key: INTRADAY_YAHOO_BEFORE_POLYGON
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_ENABLED
        sync: false
      - key: OPENAI_ANALYSIS_MAX_RETRIES
        sync: false
      - key: OPENAI_ANALYSIS_RETRY_BASE_SEC
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_KEY_ID
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_API_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: TRADING_MODE
        sync: false
      - key: DATA_DELAY_MINUTES
        sync: false
      - key: MARKET_DATA_PROVIDER_PRIORITY
        sync: false
      - key: STRATEGY_MODE
        sync: false
      - key: SCAN_AI_INCLUDE_FAILS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ALERT_ON_SCAN
        sync: false
      - key: TELEGRAM_ALERT_TOP_N
        sync: false
      - key: TELEGRAM_ALERTS_ENABLED
        sync: false
      - key: AI_PROVIDER
        value: "auto"
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: ZOYA_API_KEY
        sync: false
      - key: ZOYA_ENABLED
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FINVIZ_ELITE_AUTH
        sync: false
      - key: FINVIZ_ELITE_EXPORT_QUERY
        sync: false
      - key: FINVIZ_ELITE_EXPORT_BASE
        sync: false
      - key: FETCH_UNIVERSE_FINVIZ_FIRST
        sync: false

  # Long-polling Telegram: /scan, /signals, /help (scripts/telegram_command_bot.py)
  # Interactive /scan worker ichida o‘zi javob beradi; shuning uchun TELEGRAM_ALERT_ON_SCAN=false.
  - type: worker
    name: us-stock-rvol-telegram-bot
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
