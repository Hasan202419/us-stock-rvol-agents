      - key: TELEGRAM_MAX_SYMBOLS
        value: "0"
      - key: TELEGRAM_MAX_SYMBOLS_ALL
        value: "0"
      - key: TELEGRAM_AUTO_PUSH_USE_SCANALL
        value: "true"
      - key: TELEGRAM_AUTO_PUSH_ENABLED
        value: "true"
      - key: TELEGRAM_AUTO_PUSH_INTERVAL_MINUTES
        value: "1440"
      - key: TELEGRAM_AUTO_PUSH_FIRST_DELAY_SEC
        value: "120"
      - key: TELEGRAM_AUTO_PUSH_PASS_ONLY
