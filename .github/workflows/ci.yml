name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pydantic pydantic-settings
          pip install -r requirements.txt
      - name: Ruff
        run: ruff check agents dashboard.py strategy_core src tests scripts
      - name: Pytest
        run: python -m pytest tests -q
